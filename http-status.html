<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费在线HTTP状态码查询工具，支持按状态码、英文短语、中文说明搜索 1xx、2xx、3xx、4xx、5xx 状态码，数据仅在浏览器本地处理。">
    <meta name="keywords" content="HTTP状态码,状态码查询,HTTP 404,HTTP 500,HTTP 301,接口调试">
    <title>HTTP状态码查询工具 - 在线查询HTTP响应状态码</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="tool-page">
    <header class="site-header">
        <a href="index.html" class="brand">
            <span class="brand-mark">JP</span>
            <span>
                <strong>JavaPub Tools</strong>
                <small>HTTP状态码查询</small>
            </span>
        </a>
        <nav class="top-nav" aria-label="主导航">
            <a href="index.html">首页</a>
            <a href="timestamp.html">时间戳</a>
            <a href="cron.html">Cron解析</a>
            <a href="user-agent.html">UA解析</a>
            <a href="json-format.html">JSON</a>
            <a href="https://github.com/Rodert/jsonformat" target="_blank" rel="noopener">GitHub</a>
        </nav>
    </header>

    <main class="tool-shell">
        <section class="tool-hero">
            <div>
                <p class="eyebrow">开发调试类工具</p>
                <h1>HTTP状态码查询工具</h1>
                <p>查询常见 HTTP 响应状态码含义，适合接口调试、日志排查和文档编写。</p>
            </div>
            <strong>数据仅在浏览器本地处理，不上传服务器。</strong>
        </section>

        <section class="utility-workbench">
            <div class="utility-panel">
                <h2>状态码搜索</h2>
                <input id="status-search" type="text" placeholder="输入 404、redirect、未授权、server 等关键词">
                <div class="option-row">
                    <label><input type="radio" name="status-class" value="all" checked> 全部</label>
                    <label><input type="radio" name="status-class" value="1"> 1xx</label>
                    <label><input type="radio" name="status-class" value="2"> 2xx</label>
                    <label><input type="radio" name="status-class" value="3"> 3xx</label>
                    <label><input type="radio" name="status-class" value="4"> 4xx</label>
                    <label><input type="radio" name="status-class" value="5"> 5xx</label>
                </div>
            </div>
            <div id="status-results" class="status-grid"></div>
            <div id="status-message" class="json-message">输入关键词或选择分类快速筛选。</div>
        </section>
    </main>

    <footer class="site-footer">
        <div>
            <strong>作者：王仕宇 / JavaPub</strong>
            <p>状态码含义为常见工程解释，具体业务语义仍以接口文档为准。</p>
        </div>
        <div class="footer-links">
            <a href="json-format.html">JSON格式化</a>
            <a href="regex.html">正则测试</a>
            <a href="timestamp.html">时间戳转换</a>
        </div>
    </footer>

    <script src="js/http-status.js"></script>
</body>
</html>
